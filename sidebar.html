<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tree Tabs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>

  <header id="toolbar">
    <div id="toolbar-left">
      <div id="logo" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="3"  cy="3"  r="2.5" fill="currentColor" opacity=".9"/>
          <circle cx="3"  cy="9"  r="2.5" fill="currentColor" opacity=".6"/>
          <circle cx="3"  cy="15" r="2.5" fill="currentColor" opacity=".4"/>
          <line x1="5.5" y1="3"  x2="8"  y2="9"  stroke="currentColor" stroke-width="1.2" opacity=".4"/>
          <line x1="5.5" y1="9"  x2="8"  y2="15" stroke="currentColor" stroke-width="1.2" opacity=".3"/>
          <circle cx="11" cy="9"  r="2.5" fill="var(--accent)" opacity=".9"/>
          <circle cx="11" cy="15" r="2.5" fill="var(--accent)" opacity=".5"/>
          <line x1="13.5" y1="9" x2="16" y2="15" stroke="var(--accent)" stroke-width="1.2" opacity=".4"/>
        </svg>
      </div>
      <span id="logo-label" data-i18n="logoLabel"></span>
    </div>
    <div id="toolbar-right">
      <button class="tb-btn" id="btn-new-tab"          data-i18n-title="btnNewTab">
        <svg width="14" height="14" viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <button class="tb-btn tb-btn-accent" id="btn-group-by-domain" data-i18n-title="btnGroupByDomain">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="1" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.5"/>
          <rect x="8" y="1" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.5"/>
          <rect x="1" y="8" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.5"/>
          <rect x="8" y="8" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
      <button class="tb-btn" id="btn-ungroup" data-i18n-title="btnUngroup">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="1" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.5" opacity=".55"/>
          <rect x="8.5" y="2.5" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3" opacity=".35"/>
          <rect x="2.5" y="8.5" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3" opacity=".35"/>
          <rect x="9" y="9" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3" opacity=".55"/>
          <path d="M7 5.5v3M5.5 7h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity=".7"/>
        </svg>
      </button>
      <button class="tb-btn" id="btn-collapse-all"     data-i18n-title="btnCollapseAll">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4l5 5 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="tb-btn" id="btn-expand-all"       data-i18n-title="btnExpandAll">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10l5-5 5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="tb-btn" id="btn-popout"           data-i18n-title="btnPopout">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="3" width="8" height="8" rx="1.2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7 1h6m0 0v6M13 1L8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="tb-btn" id="btn-settings"         data-i18n-title="btnSettings">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.6"/><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.93 2.93l1.06 1.06M10.01 10.01l1.06 1.06M11.07 2.93l-1.06 1.06M3.99 10.01l-1.06 1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <div id="search-bar">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
      <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.5"/>
      <line x1="7.8" y1="7.8" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="search" id="search-input" data-i18n-placeholder="searchPlaceholder" autocomplete="off" spellcheck="false">
    <button id="search-clear" class="hidden">✕</button>
  </div>

  <div id="tree-container">
    <div id="tree-list" role="tree"></div>
    <div id="empty-state" class="hidden" aria-live="polite">
      <span class="empty-icon">🌿</span>
      <span data-i18n="emptyState"></span>
    </div>
  </div>

  <div id="settings-panel" class="hidden" role="dialog">
    <div class="settings-header">
      <span data-i18n="settingsTitle"></span>
      <button id="settings-close">✕</button>
    </div>

    <label class="setting-row">
      <span data-i18n="settingTheme"></span>
      <select id="setting-theme">
        <option value="dark"   data-i18n="themeDark"></option>
        <option value="light"  data-i18n="themeLight"></option>
        <option value="amoled" data-i18n="themeAmoled"></option>
      </select>
    </label>
    <label class="setting-row">
      <span data-i18n="settingIndent"></span>
      <select id="setting-indent">
        <option value="12" data-i18n="indentCompact"></option>
        <option value="16" data-i18n="indentNormal" selected></option>
        <option value="22" data-i18n="indentSpacious"></option>
      </select>
    </label>
    <label class="setting-row">
      <span data-i18n="settingFavicons"></span>
      <input type="checkbox" id="setting-favicons" checked>
    </label>
    <label class="setting-row">
      <span data-i18n="settingAnimations"></span>
      <input type="checkbox" id="setting-animate" checked>
    </label>
    <label class="setting-row">
      <span data-i18n="settingAutoCollapse"></span>
      <input type="checkbox" id="setting-auto-collapse">
    </label>
    <label class="setting-row">
      <span data-i18n="settingCollapseGroups"></span>
      <input type="checkbox" id="setting-collapse-groups">
    </label>
    <label class="setting-row">
      <span data-i18n="settingLanguage"></span>
      <select id="setting-language">
        <option value="en">English (US)</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="pt_BR">Português (Brasil)</option>
        <option value="ru">Русский</option>
        <option value="zh_CN">简体中文</option>
        <option value="zh_TW">繁體中文</option>
      </select>
    </label>

    <div class="settings-section-label" data-i18n="sectionPanelPosition"></div>
    <div class="setting-row setting-row-block">
      <span class="setting-hint" data-i18n="panelPositionHint"></span>
      <div class="panel-side-btns">
        <button class="panel-side-btn" id="btn-side-left">
          <svg width="36" height="26" viewBox="0 0 36 26" fill="none">
            <rect x="1" y="1" width="34" height="24" rx="3" stroke="currentColor" stroke-width="1.3" opacity=".4"/>
            <rect x="1" y="1" width="11" height="24" rx="3" fill="currentColor" opacity=".18" stroke="currentColor" stroke-width="1.3"/>
            <line x1="15" y1="7"  x2="30" y2="7"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".4"/>
            <line x1="15" y1="11" x2="27" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
            <line x1="15" y1="15" x2="29" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
          </svg>
          <span data-i18n="panelLeft"></span>
        </button>
        <button class="panel-side-btn" id="btn-side-right">
          <svg width="36" height="26" viewBox="0 0 36 26" fill="none">
            <rect x="1" y="1" width="34" height="24" rx="3" stroke="currentColor" stroke-width="1.3" opacity=".4"/>
            <rect x="24" y="1" width="11" height="24" rx="3" fill="currentColor" opacity=".18" stroke="currentColor" stroke-width="1.3"/>
            <line x1="6" y1="7"  x2="21" y2="7"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".4"/>
            <line x1="6" y1="11" x2="18" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
            <line x1="6" y1="15" x2="20" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
          </svg>
          <span data-i18n="panelRight"></span>
        </button>
      </div>
      <p id="panel-side-note" class="panel-side-note hidden"></p>
    </div>

    <div class="settings-footer" data-i18n="settingsFooter"></div>
  </div>

  <div id="ctx-menu" class="hidden" role="menu">
    <button class="ctx-item" data-action="activate">
      <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="6" cy="6" r="2" fill="currentColor"/></svg>
      <span data-i18n="ctxSwitchTo"></span>
    </button>
    <button class="ctx-item" data-action="new-child">
      <svg width="12" height="12" viewBox="0 0 12 12"><line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span data-i18n="ctxOpenChild"></span>
    </button>
    <button class="ctx-item" data-action="duplicate">
      <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="3" width="7" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M4 3V2a1 1 0 011-1h5a1 1 0 011 1v7a1 1 0 01-1 1h-1" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      <span data-i18n="ctxDuplicate"></span>
    </button>
    <div class="ctx-divider" role="separator"></div>
    <button class="ctx-item" data-action="detach">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M4 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V8M8 1h3m0 0v3M11 1L6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      <span data-i18n="ctxDetach"></span>
    </button>
    <button class="ctx-item" data-action="collapse-tree">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      <span data-i18n="ctxCollapseBranch"></span>
    </button>
    <div class="ctx-divider" role="separator"></div>
    <button class="ctx-item ctx-danger" data-action="close">
      <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span data-i18n="ctxCloseTab"></span>
    </button>
    <button class="ctx-item ctx-danger" data-action="close-tree">
      <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span data-i18n="ctxCloseBranch"></span>
    </button>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
